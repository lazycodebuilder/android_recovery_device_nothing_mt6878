#############################################
#           init.insmod.cfg                 #
# This file contains kernel modules to load #
# at init time by init.insmod.sh script     #
#                                           #
# Format:                                   #
# action|parameter                          #
#                                           #
# Supported actions:                        #
# - insmod|/path/to/module.ko              #
# - modprobe|module_name or *               #
# - setprop|property.name                   #
# - enable|/sys/path/to/enable              #
# - wait|seconds                            #
# - mount|partition|mount_point|fs|options  #
# - unmount|mount_point|force               #
#############################################

# Mount necessary partitions first (if not already mounted)
# Format: mount|partition_name|mount_point|filesystem_type|mount_options
#mount|system_dlkm|/system_dlkm|ext4|ro
mount|vendor_dlkm|/vendor_dlkm|ext4|ro
#mount|vendor|/vendor|ext4|ro

# Wait for mounts to stabilize
wait|1

# Set initial status
setprop|vendor.modules.loading|1

# Load essential modules first (order matters)
# Platform-specific modules
#modprobe|mtk_charger
#modprobe|mtk_battery
#modprobe|mtk_pmic

# Wait for power management to stabilize
#wait|1

# Display and touch modules
#modprobe|mtk_drm
#modprobe|touch_driver

# Wait for display initialization
#wait|1

# Camera modules (if needed in recovery)
# modprobe|mtk_camera

# Audio modules (usually not needed in recovery)
# modprobe|mtk_audio

# Connectivity modules (WiFi, Bluetooth - usually not needed in recovery)
# modprobe|mtk_wifi
# modprobe|mtk_bt

# Load remaining modules
modprobe|*

# Enable specific hardware features
# enable|/sys/class/power_supply/battery/present
# enable|/sys/devices/platform/charger/enable_charging

# Wait for all modules to initialize
wait|3

# Set final properties
setprop|vendor.modules.loading|0
setprop|vendor.all.modules.ready

# Optional: Set additional recovery-specific properties
setprop|vendor.recovery.modules.loaded|1

# Optional: Cleanup - unmount non-essential partitions after loading
# Uncomment if you want to free up resources after module loading
# unmount|/system_dlkm|false
# unmount|/vendor_dlkm|false